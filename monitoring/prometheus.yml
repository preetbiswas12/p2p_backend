global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'octatecode-backend'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OctateCode Backend
  - job_name: 'octatecode-backend'
    metrics_path: '/api/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['backend:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend:3000'

  # Docker daemon (if monitoring Docker)
  - job_name: 'docker'
    static_configs:
      - targets: ['unix:///var/run/docker.sock']
